<!DOCTYPE html>
<html>
<head>
  <title>Playback - Spotify Auth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <style>
    body { background: #121212; color: #fff; font-family: sans-serif; text-align: center; padding: 40px 20px; }
    a.btn { display: inline-block; background: #1DB954; color: #fff; text-decoration: none;
            padding: 16px 32px; font-size: 18px; border-radius: 24px; margin-top: 20px; }
    p { font-size: 16px; }
  </style>
</head>
<body>
  <p id="status">Connecting...</p>
  <div id="action"></div>
  <script>
    var CLIENT_ID = '0b9be8bdf4ae48d29bde7e52220d5b5e';
    var REDIRECT_URI = 'https://alex523ap.github.io/playback_config/';
    var SCOPES = 'user-read-playback-state user-modify-playback-state user-read-currently-playing playlist-read-private user-library-read user-follow-read';

    var hash = window.location.hash.substring(1);
    if (hash && hash.indexOf('access_token') !== -1) {
      // Returning from Spotify with token
      var params = {};
      var parts = hash.split('&');
      for (var i = 0; i < parts.length; i++) {
        var kv = parts[i].split('=');
        params[kv[0]] = decodeURIComponent(kv[1]);
      }
      if (params.access_token) {
        var result = JSON.stringify({
          token: params.access_token,
          expiresIn: parseInt(params.expires_in, 10) || 3600
        });
        var closeUrl = 'pebblejs://close#' + encodeURIComponent(result);

        document.getElementById('status').textContent = 'Logged in to Spotify!';
        document.getElementById('action').innerHTML =
          '<a class="btn" href="' + closeUrl + '">Return to Pebble</a>';
      }
    } else if (hash && hash.indexOf('error') !== -1) {
      document.getElementById('status').textContent = 'Auth error. Please try again.';
    } else {
      // No token yet — show login button that goes to Spotify
      var authUrl = 'https://accounts.spotify.com/authorize' +
        '?client_id=' + encodeURIComponent(CLIENT_ID) +
        '&response_type=token' +
        '&redirect_uri=' + encodeURIComponent(REDIRECT_URI) +
        '&scope=' + encodeURIComponent(SCOPES) +
        '&show_dialog=true';

      document.getElementById('status').textContent = 'Connect your Spotify account';
      document.getElementById('action').innerHTML =
        '<a class="btn" href="' + authUrl + '">Log in with Spotify</a>';
    }
  </script>
</body>
</html>
